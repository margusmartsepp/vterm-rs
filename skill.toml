name = "vterm-rs"
description = "Professional-grade Rust PTY orchestrator for AI agents. Provides state-aware terminal snapshots, resource guardrails, and atomic batching."
version = "0.7.9"

[tools]
spawn          = { command = "target/release/vterm.exe", args = ["--skill", "Spawn"], description = "Spawns a new state-aware terminal session with optional resource guardrails (max_lines, timeout_ms)." }
screen_write   = { command = "target/release/vterm.exe", args = ["--skill", "ScreenWrite"], description = "Writes keystrokes or text to a terminal. Supports shortcut tokens like <Enter>, <C-c>, <Up>." }
screen_read    = { command = "target/release/vterm.exe", args = ["--skill", "ScreenRead"], description = "Captures the current visual grid (snapshot) of the terminal screen." }
screen_control = { command = "target/release/vterm.exe", args = ["--skill", "ScreenControl"], description = "Performs window management actions like minimize, maximize, or pin." }
screen_close   = { command = "target/release/vterm.exe", args = ["--skill", "ScreenClose"], description = "Gracefully closes a terminal session and reaps the underlying process." }
list           = { command = "target/release/vterm.exe", args = ["--skill", "List"], description = "Lists all active terminal IDs owned by the current connection." }
wait           = { command = "target/release/vterm.exe", args = ["--skill", "Wait"], description = "Pauses execution for a specified duration (ms)." }
wait_until     = { command = "target/release/vterm.exe", args = ["--skill", "WaitUntil"], description = "Blocks until a specific regex pattern appears on the terminal screen buffer." }
batch          = { command = "target/release/vterm.exe", args = ["--skill", "Batch"], description = "Executes an atomic sequence of commands with near-zero latency and 'stop_on_error' logic." }

[[skills]]
name = "vterm"
description = "State-aware PTY orchestration for reliable agentic tool use."
version = "0.7.9"
capabilities = ["stateful_read", "shortcut_input", "window_management", "resource_guardrails", "batch_execution"]

[skills.config]
pipe_name = "\\\\.\\pipe\\vterm-rs-skill"
shortcuts = ["<C-c>", "<C-d>", "<Tab>", "<Enter>", "<Up>", "<Down>", "<Left>", "<Right>", "<Esc>", "<C-a>", "<C-e>"]
window_actions = ["minimize", "maximize", "restore", "close", "pin", "unpin", "menu"]
safety_limits = { max_lines_default = 1000, timeout_ms_default = 300000 }
