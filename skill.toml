name = "vterm-rs"
description = "A professional-grade Rust PTY orchestrator with advanced window management and keyboard interaction."
version = "0.6.0"

[tools]
spawn          = { command = "target/debug/vterm.exe", args = ["--skill", "Spawn"] }
screen_write   = { command = "target/debug/vterm.exe", args = ["--skill", "ScreenWrite"] }
screen_read    = { command = "target/debug/vterm.exe", args = ["--skill", "ScreenRead"] }
screen_control = { command = "target/debug/vterm.exe", args = ["--skill", "ScreenControl"] }
screen_close   = { command = "target/debug/vterm.exe", args = ["--skill", "ScreenClose"] }
list           = { command = "target/debug/vterm.exe", args = ["--skill", "List"] }
wait           = { command = "target/debug/vterm.exe", args = ["--skill", "Wait"] }
wait_until     = { command = "target/debug/vterm.exe", args = ["--skill", "WaitUntil"] }
batch          = { command = "target/debug/vterm.exe", args = ["--skill", "Batch"] }

[[skills]]
name = "superior_terminal_control"
description = "Professional terminal orchestration with stateful snapshots, keyboard shortcuts, and full window lifecycle management."
version = "0.6.0"
capabilities = ["stateful_read", "shortcut_input", "window_management", "bulk_close"]

[skills.config]
pipe_name = "\\\\.\\pipe\\vterm-rs-skill"
shortcuts = ["<C-c>", "<C-d>", "<Tab>", "<Enter>", "<Up>", "<Down>", "<Left>", "<Right>"]
window_actions = ["minimize", "maximize", "restore", "close", "pin", "unpin", "menu"]
